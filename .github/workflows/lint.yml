name: Lint and Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint.yml .

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          pip install ansible-lint
          pip install -r requirements.txt

      - name: Run ansible-lint
        run: ansible-lint playbooks/ roles/
        continue-on-error: true

  syntax-check:
    name: Ansible Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check site.yml
        run: ansible-playbook playbooks/site.yml --syntax-check -i inventory.ini

      - name: Syntax check reset.yml
        run: ansible-playbook playbooks/reset.yml --syntax-check -i inventory.ini

      - name: Syntax check rocksdb-resharding.yml
        run: ansible-playbook rocksdb-resharding.yml --syntax-check -i inventory.ini

  mypy:
    name: Python Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          pip install mypy
          pip install -r requirements.txt

      - name: Run mypy on custom modules
        run: mypy library/ module_utils/
        continue-on-error: true
